<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUG SN - Catalogue Mobile</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button { transition: all 0.2s ease; }

        #modal-image {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* Animations des panneaux escamotables */
        .drawer {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
        }
        .drawer.active {
            max-height: 80px;
            opacity: 1;
            padding: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div id="modal-image" onclick="this.style.display='none'">
        <img id="full-img" src="" alt="Vue complète">
    </div>

    <header class="bg-black sticky top-0 z-50 py-3 px-4 shadow-xl border-b border-emerald-900 flex justify-between items-center">
        <button onclick="toggleDrawer('price-container')" class="p-2 bg-zinc-900 rounded-lg border border-emerald-900 text-emerald-500 active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </button>

        <div class="flex items-center space-x-2">
            <img src="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png" alt="Logo" class="w-8 h-8 rounded-full border border-emerald-500">
            <h1 class="text-xl font-black text-white uppercase italic tracking-tighter leading-none">Mug <span class="text-emerald-500">SN</span></h1>
        </div>
        
        <button onclick="toggleDrawer('search-container')" class="p-2 bg-zinc-900 rounded-lg border border-emerald-900 text-emerald-500 active:scale-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </header>

    <div id="search-container" class="drawer bg-black border-b border-emerald-900 sticky top-[57px] z-50">
        <input type="text" id="recherche" oninput="filtrerTout()" placeholder="Rechercher (Dior, Mug, Sac...)" 
            class="w-full bg-zinc-900 text-white border border-emerald-500 rounded-xl px-4 py-2 text-sm focus:outline-none shadow-[0_0_15px_rgba(16,185,129,0.2)]">
    </div>

    <div id="price-container" class="drawer bg-black border-b border-emerald-900 sticky top-[57px] z-50">
        <div class="flex items-center justify-around space-x-2">
            <button onclick="filtrerPrix(0, 100000)" class="btn-prix text-[10px] font-black text-emerald-500 uppercase border border-emerald-500 px-3 py-1 rounded-md">Tous</button>
            <button onclick="filtrerPrix(0, 2000)" class="btn-prix text-[10px] font-black text-gray-500 uppercase border border-zinc-800 px-3 py-1 rounded-md">-2000F</button>
            <button onclick="filtrerPrix(2001, 4000)" class="btn-prix text-[10px] font-black text-gray-500 uppercase border border-zinc-800 px-3 py-1 rounded-md">2-4000F</button>
            <button onclick="filtrerPrix(4001, 100000)" class="btn-prix text-[10px] font-black text-gray-500 uppercase border border-zinc-800 px-3 py-1 rounded-md">4000F+</button>
        </div>
    </div>

    <nav class="bg-black sticky top-[57px] z-40 flex overflow-x-auto no-scrollbar space-x-2 py-3 px-4 border-b border-emerald-900/30 shadow-lg">
        <button onclick="changerCategorie('tous')" class="btn-cat whitespace-nowrap px-5 py-1.5 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase shadow-md">Tous</button>
        <button onclick="changerCategorie('Mugs')" class="btn-cat whitespace-nowrap px-5 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase">Mugs</button>
        <button onclick="changerCategorie('Vetements')" class="btn-cat whitespace-nowrap px-5 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase">Vetements</button>
        <button onclick="changerCategorie('Sacs')" class="btn-cat whitespace-nowrap px-5 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase">Sacs</button>
        <button onclick="changerCategorie('Chaussures')" class="btn-cat whitespace-nowrap px-5 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase">Chaussures</button>
    </nav>

    <main class="p-4 bg-gray-50">
        <div id="catalogue" class="grid grid-cols-1 gap-8 sm:grid-cols-2"></div>
    </main>

    <script>
        const numWhatsApp = "221773022018";
        const urlDonnees = "https://raw.githubusercontent.com/doudia1-glitch/mugs-sn-data/refs/heads/main/catalogue.json";
        const conteneurCatalogue = document.getElementById('catalogue');
        
        let catalogueGlobal = [];
        let categorieActuelle = 'tous';
        let prixMin = 0;
        let prixMax = 100000;

        function toggleDrawer(id) {
            const drawer = document.getElementById(id);
            const otherId = id === 'search-container' ? 'price-container' : 'search-container';
            document.getElementById(otherId).classList.remove('active');
            
            drawer.classList.toggle('active');
            if(id === 'search-container' && drawer.classList.contains('active')) {
                setTimeout(() => document.getElementById('recherche').focus(), 100);
            }
        }

        async function chargerCatalogue() {
            try {
                const reponse = await fetch(urlDonnees);
                const donnees = await reponse.json();
                catalogueGlobal = donnees.reverse();
                afficherMugs(catalogueGlobal);
            } catch (erreur) {
                conteneurCatalogue.innerHTML = "<p class='text-center text-red-500 text-xs py-10 font-bold'>Erreur de chargement...</p>";
            }
        }

        function ouvrirImage(url) {
            const modal = document.getElementById('modal-image');
            document.getElementById('full-img').src = url;
            modal.style.display = 'flex';
        }

        function changerCategorie(cat) {
            categorieActuelle = cat;
            document.querySelectorAll('.btn-cat').forEach(btn => {
                btn.classList.replace('bg-emerald-600', 'bg-zinc-800');
                btn.classList.replace('text-white', 'text-gray-400');
            });
            event.target.classList.replace('bg-zinc-800', 'bg-emerald-600');
            event.target.classList.replace('text-gray-400', 'text-white');
            filtrerTout();
        }

        function filtrerPrix(min, max) {
            prixMin = min; prixMax = max;
            document.querySelectorAll('.btn-prix').forEach(btn => {
                btn.classList.replace('text-emerald-500', 'text-gray-500');
                btn.classList.replace('border-emerald-500', 'border-zinc-800');
            });
            event.target.classList.replace('text-gray-500', 'text-emerald-500');
            event.target.classList.replace('border-zinc-800', 'border-emerald-500');
            filtrerTout();
            // Optionnel : ferme le drawer prix après sélection
            setTimeout(() => toggleDrawer('price-container'), 500);
        }

        function filtrerTout() {
            const texte = document.getElementById('recherche').value.toLowerCase();
            const resultats = catalogueGlobal.filter(item => {
                const matchesCat = (categorieActuelle === 'tous' || item.categorie === categorieActuelle);
                const matchesSearch = item.titre.toLowerCase().includes(texte) || item.ksu.toLowerCase().includes(texte);
                const val = parseInt(item.prix.replace(/[^0-9]/g, ''));
                return matchesCat && matchesSearch && (val >= prixMin && val <= prixMax);
            });
            afficherMugs(resultats);
        }

        function afficherMugs(listeMugs) {
            conteneurCatalogue.innerHTML = '';
            if(listeMugs.length === 0) {
                conteneurCatalogue.innerHTML = "<p class='col-span-full text-center py-20 text-gray-400 text-xs italic uppercase tracking-widest'>Aucun article trouvé</p>";
                return;
            }
            listeMugs.forEach(mug => {
                const messageWA = `Salam MUG SN, je veux commander :\n${mug.titre} (${mug.ksu})`;
                const lienWA = `https://wa.me/${numWhatsApp}?text=${encodeURIComponent(messageWA)}`;
                conteneurCatalogue.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden mb-2">
                        <img src="${mug.image}" onclick="ouvrirImage('${mug.image}')" class="w-full h-80 object-cover" loading="lazy">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-lg text-black uppercase leading-tight">${mug.titre}</h3>
                                    <p class="text-[9px] text-gray-400 font-mono">REF: ${mug.ksu}</p>
                                </div>
                                <span class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-black text-sm">${mug.prix}</span>
                            </div>
                            <a href="${lienWA}" target="_blank" class="flex items-center justify-center bg-black text-white font-black py-4 rounded-2xl w-full text-[10px] uppercase tracking-[0.2em] shadow-lg active:bg-emerald-600">
                                Commander
                            </a>
                        </div>
                    </div>`;
            });
        }
        chargerCatalogue();
    </script>
</body>
</html>
