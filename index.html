<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUG SN - Catalogue Mobile</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-black sticky top-0 z-50 py-4 px-6 shadow-xl border-b border-emerald-900">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png" alt="Logo MUG SN" class="w-10 h-10 rounded-full object-cover border-2 border-emerald-500">
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Mug <span class="text-emerald-500">SN</span></h1>
            </div>
            <span class="text-[10px] bg-emerald-600 text-white px-3 py-1 rounded-full uppercase font-bold tracking-widest">Sénégal</span>
        </div>
    </header>

    <div class="bg-black border-b border-emerald-900 sticky top-[65px] z-40">
        <nav class="flex overflow-x-auto no-scrollbar space-x-2 p-3 px-4">
            <button onclick="filtrerMugs('tous')" class="whitespace-nowrap px-6 py-2 bg-emerald-600 text-white rounded-full text-sm font-bold shadow-lg">Tous</button>
            <button onclick="filtrerMugs('Mugs')" class="whitespace-nowrap px-6 py-2 bg-zinc-800 text-gray-300 rounded-full text-sm font-bold">Mugs</button>
            <button onclick="filtrerMugs('Vetements')" class="whitespace-nowrap px-6 py-2 bg-zinc-800 text-gray-300 rounded-full text-sm font-bold">Vetements</button>
            <button onclick="filtrerMugs('Vaisselles')" class="whitespace-nowrap px-6 py-2 bg-zinc-800 text-gray-300 rounded-full text-sm font-bold">Vaisselles</button>
            <button onclick="filtrerMugs('Sacs')" class="whitespace-nowrap px-6 py-2 bg-zinc-800 text-gray-300 rounded-full text-sm font-bold">Sacs</button>
            <button onclick="filtrerMugs('Chaussures')" class="whitespace-nowrap px-6 py-2 bg-zinc-800 text-gray-300 rounded-full text-sm font-bold">Chaussures</button>
        </nav>
    </div>

    <div id="presentation-section" class="px-6 py-12 text-center bg-zinc-950 border-b border-emerald-900 mb-6 hidden">
        <h2 id="titre-presentation" class="text-3xl font-black text-emerald-500 mb-4 tracking-tighter italic uppercase"></h2>
        <p id="texte-presentation" class="text-gray-400 leading-relaxed max-w-md mx-auto font-medium text-lg"></p>
    </div>

    <main class="p-4">
        <div id="info-livraison" class="mb-8 bg-emerald-50 border-l-4 border-emerald-600 p-5 rounded-r-2xl shadow-sm">
            <div class="flex items-center mb-2">
                <span class="text-2xl mr-3">🚚</span>
                <h3 class="font-bold text-emerald-900 uppercase tracking-wider text-sm">Service de Livraison Mbour</h3>
            </div>
            <p class="text-emerald-800 font-medium leading-snug">
                Les articles que vous commanderez vous seront livrés à l'adresse que vous donnerez sur WhatsApp. 
                <span class="block mt-2 font-black text-black text-sm uppercase italic">🤝 Paiement sécurisé à la livraison après vérification.</span>
            </p>
        </div>

        <div id="catalogue" class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3"></div>
    </main>

    <footer class="text-center py-10 text-gray-400 text-xs border-t bg-white">
        &copy; 2026 <span class="text-black font-bold">MUG SN</span> - Digital Crafts à Mbour.
    </footer>

    <script>
        const infosCategories = {
            'Mugs': { titre: "L'Art du Café", texte: "Des mugs uniques pour sublimer vos moments de pause. Dites nous ce que vous desirez et on vous le fait. En plus la livraison est gratuite partout à Mbour." },
            'Vetements': { titre: "Style & Identité", texte: "Portez des vêtements qui vous ressemblent." },
            'Vaisselles': { titre: "Élégance à Table", texte: "Une sélection de vaisselle raffinée." },
            'Sacs': { titre: "Vos Essentiels, Partout", texte: "Alliez praticité et style avec nos sacs robustes." },
            'Chaussures': { 
    titre: "L'Élégance à Chaque Pas", 
    texte: "Affirmez votre style avec des modèles qui allient confort et design moderne. Pour vos sorties ou votre quotidien, marchez avec l'assurance MUG SN." 
}
        };

        const numWhatsApp = "221773022018";
        const urlDonnees = "https://raw.githubusercontent.com/doudia1-glitch/mugs-sn-data/refs/heads/main/catalogue.json";
        const conteneurCatalogue = document.getElementById('catalogue');
        let catalogueGlobal = [];

        async function chargerCatalogue() {
            try {
                const reponse = await fetch(urlDonnees);
                if (!reponse.ok) throw new Error("Erreur réseau");
                const donnees = await reponse.json();
                
                // Inversion pour afficher les derniers ajouts en haut
                catalogueGlobal = donnees.reverse();
                
                afficherMugs(catalogueGlobal);
            } catch (erreur) {
                console.error("Erreur :", erreur);
                conteneurCatalogue.innerHTML = "<p class='text-center py-10 text-red-500 font-bold'>Erreur de chargement...</p>";
            }
        }

        function afficherMugs(listeMugs) {
            conteneurCatalogue.innerHTML = '';
            listeMugs.forEach(mug => {
                const messageWA = `Salam MUG SN, je veux commander :\nDésignation : ${mug.titre}\nRéférence (KSU) : ${mug.ksu}\nPrix : ${mug.prix}`;
                const lienWA = `https://wa.me/${numWhatsApp}?text=${encodeURIComponent(messageWA)}`;
                
                conteneurCatalogue.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden">
                        <img src="${mug.image}" class="w-full h-80 object-cover" loading="lazy">
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-black uppercase tracking-tighter">${mug.titre}</h3>
                                    <p class="text-[10px] text-gray-400 font-mono">REF: ${mug.ksu}</p>
                                </div>
                                <span class="text-emerald-600 font-black text-lg">${mug.prix}</span>
                            </div>
                            <a href="${lienWA}" target="_blank" class="flex items-center justify-center bg-emerald-600 text-white font-black py-4 rounded-2xl w-full text-lg shadow-lg">
                                COMMANDER
                            </a>
                        </div>
                    </div>`;
            });
        }

        function rafraichirPresentation(cat) {
            const bloc = document.getElementById('presentation-section');
            const h2 = document.getElementById('titre-presentation');
            const p = document.getElementById('texte-presentation');
            const catFormattee = cat.charAt(0).toUpperCase() + cat.slice(1);

            if (cat !== 'tous' && infosCategories[catFormattee]) {
                h2.innerText = infosCategories[catFormattee].titre;
                p.innerText = infosCategories[catFormattee].texte;
                bloc.classList.remove('hidden');
            } else {
                bloc.classList.add('hidden');
            }
        }

        function filtrerMugs(categorie) {
            rafraichirPresentation(categorie);
            const banniere = document.getElementById('info-livraison');
            categorie === 'tous' ? banniere.classList.remove('hidden') : banniere.classList.add('hidden');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'shadow-lg');
                btn.classList.add('bg-zinc-800', 'text-gray-300');
            });
            
            if (event && event.target.tagName === 'BUTTON') {
                event.target.classList.remove('bg-zinc-800', 'text-gray-300');
                event.target.classList.add('bg-emerald-600', 'text-white', 'shadow-lg');
            }

            const resultat = categorie === 'tous' ? catalogueGlobal : catalogueGlobal.filter(m => m.categorie === categorie);
            afficherMugs(resultat);
        }

        chargerCatalogue();
    </script>
</body>
</html>
