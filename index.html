<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUG SN - Catalogue Mobile</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button { transition: all 0.2s ease; }

        #modal-image {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #modal-image img {
            max-width: 95%;
            max-height: 90%;
            border-radius: 15px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div id="modal-image" onclick="this.style.display='none'">
        <img id="full-img" src="" alt="Vue complète">
    </div>

    <header class="bg-black sticky top-0 z-50 py-2 px-4 shadow-xl border-b border-emerald-900 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="https://res.cloudinary.com/defhxkacr/image/upload/v1776450497/Gemini_Generated_Image_5gnfk25gnfk25gnf_dhkwdi.png" alt="Logo" class="w-7 h-7 rounded-full border border-emerald-500">
            <h1 class="text-sm font-black text-white uppercase italic tracking-tighter">Mug <span class="text-emerald-500">SN</span></h1>
        </div>
        <div class="w-3/5">
            <input type="text" id="recherche" oninput="filtrerTout()" placeholder="🔍 Rechercher..." 
                class="w-full bg-zinc-900 text-white border border-emerald-900 rounded-lg px-3 py-1.5 text-[11px] focus:outline-none focus:border-emerald-500 transition-all placeholder:text-gray-600">
        </div>
    </header>

    <div class="bg-black border-b border-emerald-900 sticky top-[47px] z-40 p-2 shadow-lg">
        <nav class="flex overflow-x-auto no-scrollbar space-x-1.5 mb-2">
            <button onclick="changerCategorie('tous')" class="btn-cat whitespace-nowrap px-4 py-1.5 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase tracking-tight shadow-md">Tous</button>
            <button onclick="changerCategorie('Mugs')" class="btn-cat whitespace-nowrap px-4 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase tracking-tight">Mugs</button>
            <button onclick="changerCategorie('Vetements')" class="btn-cat whitespace-nowrap px-4 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase tracking-tight">Vetements</button>
            <button onclick="changerCategorie('Sacs')" class="btn-cat whitespace-nowrap px-4 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase tracking-tight">Sacs</button>
            <button onclick="changerCategorie('Chaussures')" class="btn-cat whitespace-nowrap px-4 py-1.5 bg-zinc-800 text-gray-400 rounded-full text-[10px] font-black uppercase tracking-tight">Chaussures</button>
        </nav>

        <div class="flex items-center space-x-3 overflow-x-auto no-scrollbar border-t border-zinc-800/50 pt-2 px-1">
            <button onclick="filtrerPrix(0, 100000)" class="btn-prix whitespace-nowrap text-[9px] font-black text-emerald-500 uppercase">Max</button>
            <button onclick="filtrerPrix(0, 2000)" class="btn-prix whitespace-nowrap text-[9px] font-black text-gray-500 uppercase">- 2000 F</button>
            <button onclick="filtrerPrix(2001, 4000)" class="btn-prix whitespace-nowrap text-[9px] font-black text-gray-500 uppercase">2000-4000 F</button>
            <button onclick="filtrerPrix(4001, 100000)" class="btn-prix whitespace-nowrap text-[9px] font-black text-gray-500 uppercase">4000 F +</button>
        </div>
    </div>

    <div id="presentation-section" class="px-6 py-8 text-center bg-zinc-950 border-b border-emerald-900 mb-4 hidden">
        <h2 id="titre-presentation" class="text-xl font-black text-emerald-500 mb-2 tracking-tighter italic uppercase"></h2>
        <p id="texte-presentation" class="text-gray-400 leading-tight max-w-xs mx-auto text-xs"></p>
    </div>

    <main class="p-3">
        <div id="info-livraison" class="mb-6 bg-emerald-50 border-l-2 border-emerald-600 p-3 rounded-r-xl">
            <p class="text-emerald-800 text-[11px] font-medium leading-tight">
                🚚 Livraison à l'adresse WhatsApp. <span class="font-black text-black">Vérifiez avant de payer.</span>
            </p>
        </div>

        <div id="catalogue" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

        <section class="mt-8 p-6 bg-black rounded-[2rem] border border-emerald-900 text-center">
            <h2 class="text-lg font-black text-white uppercase italic">Besoin d'autre chose ?</h2>
            <a href="https://wa.me/221773022018?text=Salam%20MUG%20SN%2C%20j%27aimerais%20un%20article%20sp%C3%A9cial%20%3A" 
               class="inline-block mt-4 bg-emerald-600 text-white font-black px-8 py-3 rounded-xl text-[10px] uppercase tracking-widest shadow-lg">
                Proposer un article
            </a>
        </section>
    </main>

    <footer class="text-center py-6 text-gray-400 text-[9px] uppercase tracking-widest font-bold">
        &copy; 2026 MUG SN - Mbour.
    </footer>

    <script>
        const infosCategories = {
            'Mugs': { titre: "L'Art du Café", texte: "Mugs personnalisés. Livraison gratuite à Mbour." },
            'Vetements': { titre: "Style & Identité", texte: "Vêtements qui vous ressemblent." },
            'Sacs': { titre: "Vos Essentiels", texte: "Sacs robustes et stylés." },
            'Chaussures': { titre: "À chaque pas", texte: "Modèles modernes et confortables." }
        };

        const numWhatsApp = "221773022018";
        const urlDonnees = "https://raw.githubusercontent.com/doudia1-glitch/mugs-sn-data/refs/heads/main/catalogue.json";
        const conteneurCatalogue = document.getElementById('catalogue');
        
        let catalogueGlobal = [];
        let categorieActuelle = 'tous';
        let prixMin = 0;
        let prixMax = 100000;

        async function chargerCatalogue() {
            try {
                const reponse = await fetch(urlDonnees);
                const donnees = await reponse.json();
                catalogueGlobal = donnees.reverse();
                afficherMugs(catalogueGlobal);
            } catch (erreur) {
                conteneurCatalogue.innerHTML = "<p class='text-center text-red-500 text-xs'>Erreur de chargement...</p>";
            }
        }

        function ouvrirImage(url) {
            const modal = document.getElementById('modal-image');
            document.getElementById('full-img').src = url;
            modal.style.display = 'flex';
        }

        function changerCategorie(cat) {
            categorieActuelle = cat;
            rafraichirPresentation(cat);
            document.querySelectorAll('.btn-cat').forEach(btn => {
                btn.classList.replace('bg-emerald-600', 'bg-zinc-800');
                btn.classList.replace('text-white', 'text-gray-400');
            });
            event.target.classList.replace('bg-zinc-800', 'bg-emerald-600');
            event.target.classList.replace('text-gray-400', 'text-white');
            filtrerTout();
        }

        function filtrerPrix(min, max) {
            prixMin = min; prixMax = max;
            document.querySelectorAll('.btn-prix').forEach(btn => btn.classList.replace('text-emerald-500', 'text-gray-500'));
            event.target.classList.replace('text-gray-500', 'text-emerald-500');
            filtrerTout();
        }

        function filtrerTout() {
            const texte = document.getElementById('recherche').value.toLowerCase();
            const resultats = catalogueGlobal.filter(item => {
                const matchesCat = (categorieActuelle === 'tous' || item.categorie === categorieActuelle);
                const matchesSearch = item.titre.toLowerCase().includes(texte) || item.ksu.toLowerCase().includes(texte);
                const val = parseInt(item.prix.replace(/[^0-9]/g, ''));
                return matchesCat && matchesSearch && (val >= prixMin && val <= prixMax);
            });
            afficherMugs(resultats);
        }

        function rafraichirPresentation(cat) {
            const bloc = document.getElementById('presentation-section');
            const catFormattee = cat.charAt(0).toUpperCase() + cat.slice(1);
            if (cat !== 'tous' && infosCategories[catFormattee]) {
                document.getElementById('titre-presentation').innerText = infosCategories[catFormattee].titre;
                document.getElementById('texte-presentation').innerText = infosCategories[catFormattee].texte;
                bloc.classList.remove('hidden');
                document.getElementById('info-livraison').classList.add('hidden');
            } else {
                bloc.classList.add('hidden');
                document.getElementById('info-livraison').classList.remove('hidden');
            }
        }

        function afficherMugs(listeMugs) {
            conteneurCatalogue.innerHTML = '';
            if(listeMugs.length === 0) {
                conteneurCatalogue.innerHTML = "<p class='col-span-full text-center py-10 text-gray-400 text-xs italic'>Aucun article trouvé.</p>";
                return;
            }
            listeMugs.forEach(mug => {
                const messageWA = `Salam MUG SN, je veux commander :\n${mug.titre} (${mug.ksu})`;
                const lienWA = `https://wa.me/${numWhatsApp}?text=${encodeURIComponent(messageWA)}`;
                conteneurCatalogue.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-md border border-gray-100 overflow-hidden">
                        <img src="${mug.image}" onclick="ouvrirImage('${mug.image}')" class="w-full h-64 object-cover" loading="lazy">
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-black text-sm text-black uppercase leading-tight">${mug.titre}</h3>
                                    <p class="text-[8px] text-gray-400 font-mono">ID: ${mug.ksu}</p>
                                </div>
                                <span class="text-emerald-700 font-black text-xs">${mug.prix}</span>
                            </div>
                            <a href="${lienWA}" target="_blank" class="flex items-center justify-center bg-black text-white font-black py-3 rounded-xl w-full text-[10px] uppercase tracking-widest shadow-md">
                                Commander
                            </a>
                        </div>
                    </div>`;
            });
        }
        chargerCatalogue();
    </script>
</body>
</html>
